<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אלופי המתמטיקה - V1.0.0</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>אלופי המתמטיקה 🏆</h1>
            <p class="version-tag">גרסה 1.0.0</p>
            <div class="score-display">
                <span>מטבעות: </span>
                <span id="score">0</span> 🪙
            </div>
        </header>

        <nav class="tabs">
            <button id="tab-play" class="active">משחק 🎮</button>
            <button id="tab-store">חנות פרסים 🎁</button>
            <button id="tab-inventory">הפרסים שלי 🎒</button>
        </nav>

        <main id="view-play" class="view active-view">
            <div class="exercises-container">
                <div class="exercise-section card">
                    <div class="section-header">
                        <h3>חיבור ➕</h3>
                        <button class="refresh-small" onclick="window.refreshTable('addition')">🔄</button>
                    </div>
                    <div id="addition-table" class="math-grid"></div>
                </div>
                <div class="exercise-section card">
                    <div class="section-header">
                        <h3>חיסור ➖</h3>
                        <button class="refresh-small" onclick="window.refreshTable('subtraction')">🔄</button>
                    </div>
                    <div id="subtraction-table" class="math-grid"></div>
                </div>
            </div>
        </main>

        <main id="view-store" class="view hidden">
            <div class="store-header">
                <h2>חנות הפרסים 🎁</h2>
                <p>המירו מטבעות בזמן משחק!</p>
            </div>
            <div id="store-items" class="items-grid"></div>
        </main>

        <main id="view-inventory" class="view hidden">
            <div class="store-header">
                <h2>האוסף שלי 🎒</h2>
            </div>
            <div id="my-items" class="items-grid"></div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log('SW Registered'));
        }
    </script>
</body>
</html>
