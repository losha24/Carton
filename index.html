<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יוצר הדמויות החכם</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4;transition:0.3s;}
header{background:#111;color:#fff;padding:15px;text-align:center;}
.container{padding:15px;max-width:600px;margin:auto;}
input,select,textarea,button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;}
button{background:#111;color:white;cursor:pointer;}
button:hover{opacity:0.9}
.card{background:white;padding:15px;margin-top:12px;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,0.1);}
img{max-width:100%;margin-top:10px;border-radius:8px;}
.dark{background:#1e1e1e;color:white;}
.dark .card{background:#2c2c2c;}
.loader{text-align:center;padding:10px;}
</style>
</head>
<body>
<header>
<h2>🎭 יוצר הדמויות החכם</h2>
<button onclick="toggleMode()">מצב כהה / בהיר</button>
</header>
<div class="container">
<input id="charName" placeholder="שם הדמות">
<select id="charType">
<option value="cartoon character">מצוירת</option>
<option value="professional portrait">מקצועית</option>
<option value="fantasy hero">פנטזיה</option>
</select>
<textarea id="charDesc" placeholder="תיאור קצר"></textarea>
<button onclick="generateImage()">🎨 יצירת תמונה</button>
<div id="imageContainer"></div>
<button onclick="saveCharacter()">💾 שמור דמות</button>
<div id="characters"></div>
</div>

<script src="openai.js"></script>
<script>
let characters = [];

function loadCharacters(){
    const data = localStorage.getItem("characters");
    if(data){ characters = JSON.parse(data); }
    render();
}

function render(){
    const container = document.getElementById("characters");
    container.innerHTML = "";
    characters.forEach((c,index)=>{
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <h3>${c.name}</h3>
            <p><strong>${c.typeLabel}</strong></p>
            <p>${c.description}</p>
            ${c.image ? `<img src="${c.image}">` : ""}
            <button onclick="deleteCharacter(${index})">🗑 מחק</button>`;
        container.appendChild(card);
    });
}

function saveCharacter(){
    const name = document.getElementById("charName").value.trim();
    const typeSelect = document.getElementById("charType");
    const type = typeSelect.value;
    const typeLabel = typeSelect.options[typeSelect.selectedIndex].text;
    const description = document.getElementById("charDesc").value.trim();
    const image = document.querySelector("#imageContainer img")?.src || "";
    if(!name){ alert("יש להזין שם דמות"); return; }
    const character = { name,type,typeLabel,description,image };
    characters.push(character);
    localStorage.setItem("characters", JSON.stringify(characters));
    clearForm();
    render();
}

function deleteCharacter(index){
    characters.splice(index,1);
    localStorage.setItem("characters", JSON.stringify(characters));
    render();
}

function clearForm(){
    document.getElementById("charName").value="";
    document.getElementById("charDesc").value="";
    document.getElementById("imageContainer").innerHTML="";
}

function toggleMode(){ document.body.classList.toggle("dark"); }

async function generateImage(){
    const name = document.getElementById("charName").value;
    const type = document.getElementById("charType").value;
    const description = document.getElementById("charDesc").value;
    if(!name){ alert("הזן שם לפני יצירת תמונה"); return; }
    document.getElementById("imageContainer").innerHTML="<div class='loader'>טוען תמונה...</div>";
    try {
        const imgUrl = await createImageOpenAI(name,type,description);
        const img = document.createElement("img");
        img.src = imgUrl;
        const container = document.getElementById("imageContainer");
        container.innerHTML="";
        container.appendChild(img);
    } catch(err){
        console.error(err);
        document.getElementById("imageContainer").innerHTML="שגיאה ביצירת תמונה";
    }
}

loadCharacters();
</script>
</body>
</html>
