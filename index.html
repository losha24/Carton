<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    <title>קרטון - מידע רכב</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; margin: 30px 0; }
        .logo { font-size: 4rem; margin: 0; }
        .app-title { font-size: 2.2rem; font-weight: 900; color: var(--primary); margin: 0; }
        .version { font-size: 0.8rem; color: #95a5a6; }

        .search-area {
            width: 100%; max-width: 450px;
            background: var(--card-bg);
            padding: 25px; border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        input {
            width: 100%; padding: 18px; font-size: 1.6rem;
            border: 2px solid #eee; border-radius: 16px;
            text-align: center; box-sizing: border-box;
            margin-bottom: 20px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            padding: 15px; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-search { background: var(--primary); color: white; grid-column: span 2; font-size: 1.1rem; }
        .btn-reset { background: #f1f2f6; color: #57606f; }
        .btn-install { background: #27ae60; color: white; }
        .btn-pdf { background: #f39c12; color: white; width: 100%; margin-top: 15px; display: none; }

        #result-container {
            width: 100%; max-width: 450px; margin-top: 20px;
            display: none;
        }
        .info-card {
            background: white; padding: 25px; border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border-top: 8px solid var(--accent);
        }
        .row {
            display: flex; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid #f1f1f1;
        }
        .label { color: #7f8c8d; }
        .value { font-weight: 700; color: var(--primary); }
        .section-h { font-size: 0.8rem; color: var(--accent); margin-top: 15px; font-weight: bold; border-bottom: 1px solid #eee; }
        
        .loader {
            display: none; width: 30px; height: 30px;
            border: 4px solid #f3f3f3; border-top: 4px solid var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite;
            margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">📦</div>
        <h1 class="app-title">קרטון</h1>
        <div class="version">Version 7.2.1 | משרד התחבורה</div>
    </div>

    <div class="search-area">
        <input type="number" id="v_num" placeholder="הכנס מספר רכב" inputmode="numeric">
        <div class="btn-grid">
            <button class="btn-search" onclick="getData()">חפש נתונים</button>
            <button class="btn-reset" onclick="resetApp()">איפוס</button>
            <button id="installBtn" class="btn-install" style="display:none;">התקן אפליקציה</button>
        </div>
        <div id="loader" class="loader"></div>
    </div>

    <div id="result-container">
        <div id="pdf-area" class="info-card">
            <div id="data-body"></div>
        </div>
        <button id="pdfBtn" class="btn-pdf" onclick="savePDF()">שמור קובץ PDF להדפסה</button>
    </div>

    <script>
        // רישום Service Worker לעבודה באופליין
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        async function getData() {
            const num = document.getElementById('v_num').value;
            if (!num) return;

            document.getElementById('loader').style.display = 'block';
            
            const urls = {
                main: `https://data.gov.il/api/3/action/datastore_search?resource_id=053ad243-5e38-4213-93c7-cf135073599e&q=${num}`,
                tech: `https://data.gov.il/api/3/action/datastore_search?resource_id=36585801-3432-4f04-8428-59fa4f3bc412&q=${num}`
            };

            try {
                const [rMain, rTech] = await Promise.all([
                    fetch(urls.main).then(res => res.json()),
                    fetch(urls.tech).then(res => res.json())
                ]);

                const car = rMain.result.records[0];
                const tech = rTech.result.records[0] || {};

                if (car) {
                    render(car, tech);
                    localStorage.setItem('last_car', JSON.stringify({car, tech}));
                } else {
                    alert("לא נמצאו נתונים למספר זה");
                }
            } catch (e) {
                alert("שגיאה בחיבור למאגרי המידע");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function render(car, tech) {
            const body = document.getElementById('data-body');
            const fee = car.kvutzat_rishuy ? (800 + (parseInt(car.kvutzat_rishuy) * 350)) : "לא חושב";

            body.innerHTML = `
                <h2 style="text-align:center; margin-bottom:5px;">${car.tozeret_nm}</h2>
                <p style="text-align:center; color:var(--accent); font-weight:bold; margin-top:0;">${car.kinuy_mishari}</p>
                <div style="background:#f1f2f6; text-align:center; padding:10px; border-radius:10px; font-size:1.4rem; font-weight:800; margin-bottom:20px;">
                    ${car.mispar_rechev}
                </div>
                
                <div class="section-h">פרטים כלליים</div>
                <div class="row"><span class="label">שנת יצור:</span><span class="value">${car.shnat_yitzur}</span></div>
                <div class="row"><span class="label">צבע:</span><span class="value">${car.tzeva_rechev}</span></div>
                <div class="row"><span class="label">בעלות:</span><span class="value">${car.baalut}</span></div>
                
                <div class="section-h">מפרט טכני</div>
                <div class="row"><span class="label">נפח מנוע:</span><span class="value">${tech.nefach_manoa || '---'} סמ"ק</span></div>
                <div class="row"><span class="label">סוג דלק:</span><span class="value">${tech.sug_delek_nm || '---'}</span></div>
                
                <div class="section-h">רישוי ואגרות</div>
                <div class="row"><span class="label">טסט עד:</span><span class="value">${car.tokef_test}</span></div>
                <div class="row"><span class="label">אגרת רישוי משוערת:</span><span class="value">₪${fee}</span></div>
            `;
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('pdfBtn').style.display = 'block';
        }

        function resetApp() {
            document.getElementById('v_num').value = "";
            document.getElementById('result-container').style.display = 'none';
            localStorage.clear();
        }

        function savePDF() {
            const element = document.getElementById('pdf-area');
            html2pdf().from(element).save(`Car_Report_${document.getElementById('v_num').value}.pdf`);
        }

        // לוגיקת התקנה
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        document.getElementById('installBtn').addEventListener('click', () => {
            if (deferredPrompt) deferredPrompt.prompt();
        });
    </script>
</body>
</html>
