<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>אלופי המתמטיקה - 3.5.9</title>
    <link rel="stylesheet" href="style.css?v=3.5.9">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.PNG">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="stats-container">
                <div class="stat-card level">
                    <span class="stat-label">רמה</span>
                    <span id="user-level" class="stat-value">1</span>
                </div>
                <div class="stat-card coins">
                    <span class="stat-label">מטבעות</span>
                    <span class="stat-value">🪙 <span id="score">0</span></span>
                </div>
            </div>
            <h1 class="main-title">אלופי המתמטיקה 🏆</h1>
        </header>

        <nav class="tabs">
            <button id="tab-play" class="active">🎮 משחק</button>
            <button id="tab-store">🎁 חנות</button>
            <button id="tab-inventory">🎒 אוסף</button>
            <button onclick="window.forceUpdate()" class="update-tab-btn">🔄 רענן</button>
            <button id="reset-game-btn" class="reset-tab-btn">🛑 איפוס</button>
        </nav>

        <div class="scroll-area">
            <main id="view-play" class="view">
                <div class="card summary-card">
                    <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
                    <p id="progress-text">עוד 10 תרגילים להפתעה! ✨</p>
                </div>
                
                <section class="exercise-section card">
                    <div class="section-header">
                        <div class="clickable-area" onclick="window.toggleSection('section-basic')">
                            <span class="toggle-icon" id="icon-basic">▼</span>
                            <h3>חיבור וחיסור ➕➖</h3>
                        </div>
                        <button class="mini-refresh" onclick="refreshTable('addition'); refreshTable('subtraction');">🎲</button>
                    </div>
                    <div id="section-basic" class="collapsible-content">
                        <div id="addition-table" class="math-grid"></div>
                        <div id="subtraction-table" class="math-grid" style="margin-top:10px"></div>
                    </div>
                </section>

                <section class="exercise-section card">
                    <div class="section-header">
                        <div class="clickable-area" onclick="window.toggleSection('section-advanced')">
                            <span class="toggle-icon" id="icon-advanced">▼</span>
                            <h3>כפל וחילוק ✖️➗</h3>
                        </div>
                        <button class="mini-refresh" onclick="refreshTable('multiplication'); refreshTable('division');">🎲</button>
                    </div>
                    <div id="section-advanced" class="collapsible-content">
                        <div id="multiplication-table" class="math-grid"></div>
                        <div id="division-table" class="math-grid" style="margin-top:10px"></div>
                    </div>
                </section>
            </main>

            <main id="view-store" class="view hidden">
                <div class="admin-box card">
                    <button onclick="window.toggleAdmin()" class="admin-toggle-btn">⚙️ ניהול הורים (הוספת פרסים)</button>
                    <div id="admin-panel" class="admin-content hidden">
                        <div class="admin-form">
                            <input type="text" id="new-item-name" placeholder="שם הפרס">
                            <input type="number" id="new-item-price" placeholder="מחיר">
                            <select id="new-item-icon" class="admin-select">
                                <optgroup label="🍕 אוכל">
                                    <option value="🍕">🍕 פיצה</option><option value="🍦">🍦 גלידה</option>
                                    <option value="🍭">🍭 ממתק</option><option value="🍿">🍿 פופקורן</option>
                                    <option value="🍩">🍩 דונאט</option><option value="🍫">🍫 שוקולד</option>
                                </optgroup>
                                <optgroup label="🎮 פנאי">
                                    <option value="🎮">🎮 מחשב</option><option value="📱">📱 טלפון</option>
                                    <option value="🧸">🧸 צעצוע</option><option value="🎲">🎲 משחק</option>
                                    <option value="🎬">🎬 סרט</option>
                                </optgroup>
                                <optgroup label="⚽ ספורט">
                                    <option value="⚽">⚽ כדורגל</option><option value="🚲">🚲 אופניים</option>
                                    <option value="🏊">🏊 בריכה</option>
                                </optgroup>
                                <optgroup label="🌟 מיוחד">
                                    <option value="🎁">🎁 הפתעה</option><option value="⭐">⭐ כוכב</option>
                                    <option value="💵">💵 דמי כיס</option>
                                </optgroup>
                            </select>
                            <button onclick="window.addNewItem()" class="add-item-btn">שמור בחנות ✨</button>
                        </div>
                        <div id="admin-manage-list"></div>
                    </div>
                </div>
                <div id="store-items" class="items-grid"></div>
            </main>

            <main id="view-inventory" class="view hidden">
                <div id="my-items" class="items-grid"></div>
            </main>
        </div>

        <footer class="main-footer">
            <p>© כל הזכויות שמורות - אלכסיי זבודיסקר | גרסה 3.5.9</p>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="app.js?v=3.5.9"></script>
</body>
</html>
